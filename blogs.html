<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimTak | ब्लॉग्स आणि ताज्या बातम्या</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tiro+Devanagari+Marathi:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #00BFFF;
  --blue-dark: #0099DD;
  --black: #080808;
  --off-white: #f2ede6;
  --muted: #7a7268;
  --border: rgba(255,255,255,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black);
  color: var(--off-white);
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── NAVBAR ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 48px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-brand { display: flex; align-items: center; gap: 16px; text-decoration: none; }
.nav-brand-text { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #fff; }
.nav-brand-text span { color: #f03030; } /* 'Tak' चा लाल रंग तसाच */

.nav-links { display: flex; align-items: center; gap: 24px; }
.nav-links a { color: #f2ede6; text-decoration: none; font-size: 16px; font-weight: 500; }
.nav-links a:hover { color: var(--blue); }

/* LANGUAGE BAR */
.lang-bar {
  position: fixed;
  top: 70px; left: 0; right: 0;
  z-index: 99;
  display: flex;
  justify-content: center;
  background: rgba(8,8,8,0.97);
  border-bottom: 2px solid rgba(255,255,255,0.1);
}
.lang-btn {
  padding: 12px 24px;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: #9a9288;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.lang-btn.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
  background: rgba(0,191,255,0.06);
}

/* ── BLOGS SECTION ── */
.blogs-container {
  max-width: 1100px;
  margin: 160px auto 60px;
  padding: 0 24px;
}
.page-title {
  font-family: 'Tiro Devanagari Marathi', serif;
  font-size: 36px;
  margin-bottom: 40px;
  border-left: 4px solid var(--blue);
  padding-left: 15px;
}

/* CARD LAYOUT */
.blogs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px;
}
.blog-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer;
}
.blog-card:hover {
  transform: translateY(-5px);
  border-color: var(--blue);
}
.blog-img { width: 100%; height: 200px; object-fit: cover; background: #222; }
.blog-content { padding: 24px; }
.blog-date { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.blog-title { font-size: 20px; color: #fff; margin-bottom: 12px; line-height: 1.4; }
.blog-desc { font-size: 14px; color: #b0a898; line-height: 1.6; margin-bottom: 20px; }
.read-more-btn { color: var(--blue); font-weight: 700; font-size: 14px; display: inline-block; }

/* ── MODAL WINDOW FOR FULL ARTICLE ── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal.open { display: flex; }
.modal-content {
  background: #111;
  border: 1px solid var(--border);
  max-width: 800px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  border-radius: 12px;
  padding: 30px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  background: rgba(255,255,255,0.08);
  border: none; color: #fff;
  width: 35px; height: 35px;
  border-radius: 50%; cursor: pointer;
  font-size: 18px;
}
.modal-body { line-height: 1.8; color: #c0b9b0; font-size: 16px; }
.modal-body h2 { color: #fff; margin: 20px 0 10px; font-size: 22px; }
.modal-body p { margin-bottom: 16px; }

@media (max-width: 768px) {
  nav { padding: 12px 20px; }
  .nav-links { gap: 12px; }
  .nav-links a { font-size: 14px; }
  .lang-bar { top: 60px; }
  .blogs-container { margin-top: 140px; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <a class="nav-brand" href="index.html">
    <div class="nav-brand-text">Claim<span>Tak</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html">होम (Home)</a>
    <a href="blogs.html" style="color: var(--blue);">ब्लॉग्स (Blogs)</a>
  </div>
</nav>

<!-- LANGUAGE BAR -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="changeLang('mr')" id="btn-mr">मराठी</button>
  <button class="lang-btn" onclick="changeLang('hi')" id="btn-hi">हिंदी</button>
  <button class="lang-btn" onclick="changeLang('en')" id="btn-en">English</button>
</div>

<!-- BLOGS CONTAINER -->
<div class="blogs-container">
  <h1 class="page-title" id="page-heading">ताज्या बातम्या आणि लेख</h1>
  
  <div class="blogs-grid" id="blogs-grid-container">
    <!-- ब्लॉग कार्ड्स JavaScript द्वारे लोड होतील -->
  </div>
</div>

<!-- FULL ARTICLE MODAL -->
<div class="modal" id="articleModal" onclick="closeModalOutside(event)">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-article-body" class="modal-body">
      <!-- पूर्ण लेख इथे दिसेल -->
    </div>
  </div>
</div>

  en: {

      {

      {

        title: "Will LIC bail out the national economy once again?",

        desc: "LIC's role has always been crucial during financial fluctuations in the country. A special analysis on 2026 financial shifts.",
        full: `<h2>LIC's Contribution to the National Economy</h2>
              <p>📅 May 27, 2026 · Navin Parakh, ClaimTak Pune</p><br>

let currentLang = 'mr';

// फॅंक्शन: ब्लॉग्स ग्रिड रेंडर करणे
function renderBlogs() {
  const container = document.getElementById('blogs-grid-container');
  const heading = document.getElementById('page-heading');
  
  heading.innerText = blogData[currentLang].heading;
  container.innerHTML = '';

  blogData[currentLang].articles.forEach(article => {
    const card = document.createElement('div');
    card.className = 'blog-card';
    card.onclick = () => openArticle(article.id);
    
    card.innerHTML = `
      <div class="blog-content">
        <div class="blog-date">\${article.date}</div>
        <h2 class="blog-title">\${article.title}</h2>
        <p class="blog-desc">\${article.desc}</p>
        <span class="read-more-btn">\${blogData[currentLang].readMore}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

// फॅंक्शन: भाषा बदलणे
function changeLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`btn-\${lang}`).classList.add('active');
  renderBlogs();
}

// फॅंक्शन: पॉपअप (Modal) ओपन करणे
function openArticle(id) {
  const article = blogData[currentLang].articles.find(a => a.id === id);
  if (article) {
    document.getElementById('modal-article-body').innerHTML = article.full;
    document.getElementById('articleModal').classList.add('open');
  }
}

// फॅंक्शन: पॉपअप क्लोज करणे
function closeModal() {
  document.getElementById('articleModal').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target.id === 'articleModal') {
    closeModal();
  }
}

// सुरुवातीला मराठी ब्लॉग्स लोड करणे
renderBlogs();
</script>

</body>
  </html>
