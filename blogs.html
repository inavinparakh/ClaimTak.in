function setLang(lang) {
  currentLang = lang;
  
  // Update language buttons
  ['mr', 'hi', 'en'].forEach(l => {
    document.getElementById('lb-' + l).classList.toggle('active', l === lang);
  });
  
  // Update i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (T[lang] && T[lang][key]) {
      el.textContent = T[lang][key];
    }
  });
  
  // Update news grid
  renderNews();
  
  // Update HTML lang
  document.documentElement.lang = lang === 'en' ? 'en' : lang === 'hi' ? 'hi' : 'mr';
}

function renderNews() {
  const articles = newsArticles[currentLang] || newsArticles['mr'];
  const grid = document.getElementById('newsGrid');
  grid.innerHTML = '';
  
  articles.forEach((article, index) => {
    const card = document.createElement('div');
    card.className = `news-card ${index === 0 ? 'featured' : ''}`;
    
    card.innerHTML = `
      <img src="${article.image}" alt="${article.title}" class="news-image" onerror="this.style.display='none'">
      <div class="news-content">
        <div class="news-date">${article.date}</div>
        <h3 class="news-heading">${article.title}</h3>
        <p class="news-excerpt">${article.excerpt}</p>
        <a href="#" class="read-more">पूर्ण वाचा →</a>
      </div>
    `;
    
    card.onclick = (e) => {
      e.preventDefault();
      openArticle(article);
    };
    
    grid.appendChild(card);
  });
}

function openArticle(article) {
  const content = document.getElementById('articleContent');
  content.innerHTML = article.content;
  document.getElementById('articleModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeArticle() {
  document.getElementById('articleModal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeArticleOutside(e) {
  if (e.target === document.getElementById('articleModal')) closeArticle();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeArticle();
});

// Initial render
renderNews();
