<style>
:root {
  --blue: #00BFFF;
  --blue-dark: #0099DD;
  --black: #080808;
  --off-white: #f2ede6;
  --muted: #7a7268;
  --border: rgba(255,255,255,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black);
  color: var(--off-white);
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── NAVBAR ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 48px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-brand { display: flex; align-items: center; gap: 16px; text-decoration: none; }
.nav-brand-text { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #fff; }
.nav-brand-text span { color: #f03030; }

.nav-links { display: flex; align-items: center; gap: 24px; }
.nav-links a { color: #f2ede6; text-decoration: none; font-size: 16px; font-weight: 500; }
.nav-links a:hover { color: var(--blue); }

/* LANGUAGE BAR */
.lang-bar {
  position: fixed;
  top: 70px; left: 0; right: 0;
  z-index: 99;
  display: flex;
  justify-content: center;
  background: rgba(8,8,8,0.97);
  border-bottom: 2px solid rgba(255,255,255,0.1);
}
.lang-btn {
  padding: 12px 24px;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: #9a9288;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.lang-btn.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
  background: rgba(0,191,255,0.06);
}

/* ── BLOGS SECTION ── */
.blogs-container {
  max-width: 1100px;
  margin: 160px auto 60px;
  padding: 0 24px;
}
.page-title {
  font-family: 'Tiro Devanagari Marathi', serif;
  font-size: 36px;
  margin-bottom: 40px;
  border-left: 4px solid var(--blue);
  padding-left: 15px;
}

/* CARD LAYOUT */
.blogs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px;
}
.blog-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer;
}
.blog-card:hover {
  transform: translateY(-5px);
  border-color: var(--blue);
}
.blog-content { padding: 24px; }
.blog-date { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.blog-title { font-size: 20px; color: #fff; margin-bottom: 12px; line-height: 1.4; }
.blog-desc { font-size: 14px; color: #b0a898; line-height: 1.6; margin-bottom: 20px; }
.read-more-btn { color: var(--blue); font-weight: 700; font-size: 14px; display: inline-block; }

/* ── MODAL WINDOW FOR FULL ARTICLE ── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal.open { display: flex; }
.modal-content {
  background: #111;
  border: 1px solid var(--border);
  max-width: 800px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  border-radius: 12px;
  padding: 30px;
  position: relative;
}
.modal-content img { width: 100%; height: auto; border-radius: 6px; margin-bottom: 20px; border: 1px solid var(--border); }
.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  background: rgba(255,255,255,0.08);
  border: none; color: #fff;
  width: 35px; height: 35px;
  border-radius: 50%; cursor: pointer;
  font-size: 18px;
}
.modal-body { line-height: 1.8; color: #c0b9b0; font-size: 16px; }
.modal-body h2 { color: #fff; margin: 20px 0 10px; font-size: 22px; }
.modal-body p { margin-bottom: 16px; }
.modal-body blockquote { background: rgba(0,191,255,0.06); border-left: 3px solid var(--blue); padding: 14px 16px; border-radius: 0 4px 4px 0; margin-bottom: 16px; color: #fff; }

@media (max-width: 768px) {
  nav { padding: 12px 20px; }
  .nav-links { gap: 12px; }
  .nav-links a { font-size: 14px; }
  .lang-bar { top: 60px; }
  .blogs-container { margin-top: 140px; }
}
</style>

<script>
const blogData = {
  mr: {
    heading: "ताज्या बातम्या आणि लेख",
    readMore: "पूर्ण वाचा →",
    articles: [
      {
        id: 1,
        title: "राजेश एक्सपोर्ट्समुळे एलआयसी बुडाली? सोशल मीडियावरील 'त्या' १५ लाख कोटींच्या अफवेमागचं खरं सत्य!",
        date: "०६ जून २०२६",
        desc: "अर्धवट ज्ञानाच्या आधारावर सुरू असलेल्या 'बोंबाश्रीमंती'मुळे सामान्य पॉलिसीधारक आणि गुंतवणूकदार प्रचंड घाबरले आहेत. एलआयसी बुडाल्याची अफवा आणि त्यामागचे खरे सत्य...",
        full: `<img src="news_analysis_lic.png" alt="LIC Rajesh Exports Truth - ClaimTak"><h2>राजेश एक्सपोर्ट्समुळे एलआयसी बुडाली? सोशल मीडियावरील 'त्या' १५ लाख कोटींच्या अफवेमागचं खरं सत्य!</h2><p>📅 ०६ जून २०२६ · नविन पारख, ClaimTak पुणे</p><br><p>गेल्या दोन दिवसांपासून सोशल मीडिया आणि काही न्यूज चॅनल्सवर एकच गोंधळ सुरू आहे— <strong>"एलआयसी धोक्यात!", "राजेश एक्सपोर्ट्सने एलआयसीचे १५ लाख कोटी बुडवले!", "पॉलिसीधारकांचे पैसे गेले!"</strong></p><p>फेसबुक, यूट्यूब आणि व्हॉट्सॲपवर तर जणू काही एलआयसी उद्याच बंद होणार अशा थाटात व्हिडिओ आणि पोस्ट शेअर केल्या जात आहेत. अर्धवट ज्ञानाच्या आधारावर सुरू असलेल्या या 'बोंबाश्रीमंती'मुळे सामान्य पॉलिसीधारक आणि गुंतवणूकदार प्रचंड घाबरले आहेत.</p><p>पण खरंच देशातील सर्वात मोठी विमा कंपनी एलआयसी (LIC) बुडाली आहे का? की हा फक्त टीआरपी (TRP) आणि व्ह्यूज (Views) मिळवण्यासाठी रचलेला अवास्तव बातमीचा खेळ आहे? <strong>'क्लेम तक'वर आज आपण या संपूर्ण प्रकरणाची दूध का दूध आणि पाणी का पाणी करणारी सत्यता सविस्तर समजून घेणार आहोत.</strong></p><h3>**गोंधळ नेमका कुठे झाला? (१५ लाख कोटी की ३०० कोटी?)**</h3><p>सोशल मीडियावरील 'इन्फ्लुएन्सर्स' आणि काही पत्रकारांना आर्थिक गणिते समजत नाहीत की समजावून घ्यायची नसतात, हाच मोठा प्रश्न आहे. त्यांनी दोन वेगवेगळ्या गोष्टींची अशी काही खिचडी केली की लोकांनी थेट एलआयसी बुडाल्याचा निष्कर्ष काढला.</p><p>📌 <strong>१५ लाख कोटींचा आकडा कुठून आला?:</strong> भांडवली बाजार नियामक संस्था <strong>'सेबी' (SEBI)</strong> ने ३ जून २०२६ रोजी 'राजेश एक्सपोर्ट्स' या कंपनीवर एक interim order जारी केली. सेबीच्या म्हणण्यानुसार, या कंपनीने आर्थिक वर्ष २०२१ ते २०२५ या ५ वर्षांच्या काळात आपल्या महसुलात (Revenue) तब्बल <strong>१५.१५ लाख कोटी रुपयांची बोगस किंवा फुगवून (Inflated) आकडेवारी</strong> दाखवली. <strong>हा घोटाळा राजेश एक्सपोर्ट्सने त्यांच्या स्वतःच्या खात्यात केलेला आहे, एलआयसीने त्यात १५ लाख कोटी गुंतवलेले नव्हते!</strong></p><p>📌 <strong>एलआयसीचे ॲक्च्युली नुकसान किती?:</strong> राजेश एक्सपोर्ट्स या कंपनीत एलआयसीची सुमारे <strong>१०.८०% भागीदारी</strong> आहे. एलआयसीकडे या कंपनीचे ३.१९ कोटी शेअर्स आहेत. सेबीच्या कारवाईनंतर या कंपनीचा शेअर कोसळल्यामुळे एलआयसीच्या या गुंतवणुकीचे मूल्य कमी झाले आहे. गेल्या काही महिन्यांत एलआयसीला यात <strong>सुमारे २९० ते ३०० कोटी रुपयांचे नुकसान (Notional Loss)</strong> सहन करावे लागले आहे.</p><blockquote><strong>सोप्या भाषेत सांगायचे तर:</strong> घोटाळा १५ लाख कोटींचा आहे, पण एलआयसीचे नुकसान फक्त ३०० कोटींचे आहे! Social media ने ३०० कोटींच्या नुकसानाला थेट १५ लाख कोटींचे नुकसान बनवून लोकांमध्ये भीती पसरवली.</blockquote><h3>**५७ लाख कोटींच्या समुद्रात ३०० कोटींचा थेंब!**</h3><p>आता विचार करा, एखाद्या व्यक्तीच्या बँक खात्यात <strong>५७,००० रुपये</strong> असतील आणि त्याचे <strong>३ रुपये</strong> कुठेतरी हरवले, तरो माणूस भिकारी होईल का? त्याचे दिवाळे निघेल का? नक्कीच नाही!</p><p>एलआयसीच्या बाबतीत नेमके हेच घडले आहे. मार्च २०२६ च्या अधिकृत आकडेवारीनुसार, एलआयसीचा एकूण पोर्टफोलिओ (Assets Under Management - AUM) तब्बल <strong>५७.३० लाख कोटी रुपयांचा</strong> आहे. या अथांग समुद्रासारख्या पोर्टफोलिओसमोर ३०० कोटी रुपयांचे नुकसान म्हणजे केवळ एका थेंबासारखे आहे.</p><p><strong>चला, एलआयसीच्या शेअर कपाटातील (Equity Portfolio) एकूण गुंतवणुकीच्या गणितातून ही टक्केवारी समजून घेऊया:</strong></p><p>📊 शेअर बाजारामध्ये एलआयसीची विविध कंपन्यांमधील एकूण गुंतवणूक <strong>सुमारे १४ ते १५ लाख कोटी रुपयांच्या</strong> घरात आहे.<br>📊 या एकूण १४-१५ लाख कोटींपैकी राजेश एक्सपोर्ट्समध्ये गुंतवलेली रक्कम घसरणीपूर्वी फक्त <strong>६३७ कोटी रुपये</strong> होती.<br>📊 म्हणजेच, एलआयसीच्या एकूण शेअर मार्केटमधील गुंतवणुकीच्या तुलनेत राजेश एक्सपोर्ट्समधील गुंतवणूक <strong>केवळ ०.०४% ते ०.०५% (म्हणजे १ टक्क्याचा शंभरावा भाग!)</strong> इतकी अत्यंत लहान आणि नगण्य होती.</p><p>यावरून स्पष्ट होते की, एलआयसी तोट्यात जाणे किंवा बुडणे तांत्रिकदृष्ट्या संपूर्णपणे असंभव आहे.</p><h3>**टीआरपी आणि व्ह्यूजसाठी अवास्तव बातम्यांचा मारा**</h3><p>आजकाल सोशल मीडिया आणि मीडियामध्ये <strong>'क्लिकबेट' (Clickbait) संस्कृती</strong> प्रचंड वाढली आहे. "एलआयसी
